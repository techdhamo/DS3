version: '3.8'

services:
  # DS3 World Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://ds3admin:ds3securepassword@postgres:5432/ds3world?schema=public
      - NEXTAUTH_URL=https://ds3.world
      - NEXTAUTH_SECRET=ds3_world_secret_9f2a8b7c3d1e6f5a4b8c7d2e9f1a6b3c5d8e2f7a4b9c1d6e3f8a7b2c5d9e1f6a
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - RAZORPAY_WEBHOOK_SECRET=${RAZORPAY_WEBHOOK_SECRET}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=noreply@ds3.world
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - ds3-network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=ds3world
      - POSTGRES_USER=ds3admin
      - POSTGRES_PASSWORD=ds3securepassword
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - ds3-network

  # Cloudflare Tunnel
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ds3-cloudflared-1
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./cloudflare-tunnel.yml:/etc/cloudflared/config.yml:ro
      - ./cert.json:/etc/cloudflared/cert.json:ro
    command: tunnel --config /etc/cloudflared/config.yml run
    networks:
      - ds3-network

volumes:
  pgdata:

networks:
  ds3-network:
    driver: bridge
