server:
  port: 8082

spring:
  application:
    name: integration-adapter
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ds3_ucp}
    username: ${DB_USER:ds3}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# GraphQL
graphql:
  servlet:
    enabled: true
    mapping: /graphql
  graphiql:
    enabled: true

# Resilience4j
resilience4j:
  retry:
    instances:
      baapStoreApi:
        max-attempts: 3
        wait-duration: 1000
  circuitbreaker:
    instances:
      baapStoreApi:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000

# BaapStore API
baapstore:
  api:
    url: ${BAAPSTORE_API_URL:https://api.baapstore.com}
    key: ${BAAPSTORE_API_KEY}

logging:
  level:
    com.ds3.integration: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
