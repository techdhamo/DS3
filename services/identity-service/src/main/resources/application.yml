server:
  port: 8081

spring:
  application:
    name: identity-service
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ds3_identity}
    username: ${DB_USER:ds3}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
  
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: identity-service
      auto-offset-reset: earliest

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-secret-key-change-in-production}
  expiration: 604800000 # 7 days

# AWS S3 Configuration
aws:
  region: ${AWS_REGION:ap-south-1}
  s3:
    bucket: ${S3_BUCKET:ds3-identity-photos}
  kms:
    key-id: ${KMS_KEY_ID:alias/ds3-identity-encryption}

# Encryption Configuration
encryption:
  key: ${ENCRYPTION_KEY:}
  enabled: ${ENCRYPTION_ENABLED:true}

# SendGrid Configuration
sendgrid:
  api:
    key: ${SENDGRID_API_KEY:}

# App Configuration
app:
  base:
    url: ${APP_BASE_URL:http://localhost:3000}

# Logging
logging:
  level:
    com.ds3.identity: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Management Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
